<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#161b22;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="metal" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#c0c0c0;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#e8e8e8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#a0a0a0;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="100" height="100" rx="18" fill="url(#bg)" stroke="#00ff41" stroke-width="2" stroke-opacity="0.5"/>
  <!-- JH Monogram -->
  <text x="50" y="65" font-family="Arial Black, Arial, sans-serif" font-size="48" font-weight="900" fill="url(#metal)" text-anchor="middle" filter="url(#glow)">JH</text>
  <!-- Circuit accent lines -->
  <line x1="15" y1="80" x2="35" y2="80" stroke="#00ff41" stroke-width="1.5" stroke-opacity="0.6"/>
  <circle cx="35" cy="80" r="2" fill="#00ff41" fill-opacity="0.8"/>
  <line x1="65" y1="80" x2="85" y2="80" stroke="#00ff41" stroke-width="1.5" stroke-opacity="0.6"/>
  <circle cx="65" cy="80" r="2" fill="#00ff41" fill-opacity="0.8"/>
</svg>
